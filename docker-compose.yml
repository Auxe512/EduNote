services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    user: root  # Required for bind mounts on Linux
    ports:
      - "8000:8000"
    volumes:
      - ./surreal_data:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    restart: always
    pull_policy: always

  open_notebook:
    image: lfnovo/open_notebook:v1-latest
    ports:
      - "8502:8502"  # Web UI
      - "5055:5055"  # REST API
    environment:
      # REQUIRED: Change this to your own secret string
      # This encrypts your API keys in the database
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=edunote-secret-2026

      # Database connection (default values - no need to change)
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./notebook_data:/app/data
      - ./api:/app/api
      - ./open_notebook:/app/open_notebook
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./migrations:/app/migrations
      - ./frontend/.next:/app/frontend/.next
      - ./frontend/.next/standalone/server.js:/app/frontend/server.js
    depends_on:
      - surrealdb
    restart: always
    pull_policy: always
